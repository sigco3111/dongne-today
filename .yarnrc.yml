# Yarn 4 설정 — dongne-today 독립 프로젝트
# 상위 디렉토리(package.json 보유)는 workspaces로 명시적 격리
#
# TDS (@toss/tds-react-native): 2025-10부터 public npm registry 공개
# 토큰 불필요 — https://tossmini-docs.toss.im/tds-react-native/start/ 참고
enableTelemetry: false
enableGlobalCache: false
cacheFolder: .yarn/cache

# React Native는 PnP 비호환 — 전통적 node_modules 사용
nodeLinker: node-modules